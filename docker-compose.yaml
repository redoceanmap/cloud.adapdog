services:
  backend:
    build:
      context: ./adapdog
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./adapdog:/app
      - ./csv:/csv:ro
    env_file:
      - ./adapdog/.env

  frontend:
    build:
      context: ./www
      dockerfile: Dockerfile
      args:
        VITE_USE_MOCK: "false"
        VITE_API_BASE_URL: "/api"
    ports:
      - "3000:80"
    depends_on:
      - backend
