# adapdog 단일 DB alembic 설정.

[alembic]
# 마이그레이션 스크립트 위치 (이 ini 파일 기준 상대경로).
script_location = %(here)s/alembic

# bounded context 를 `map.xxx` / `users.xxx` 로 임포트하기 위해 apps 를 sys.path 에 추가.
prepend_sys_path = apps
path_separator = os

# 실제 URL 은 env.py 가 DATABASE_URL 환경변수에서 주입한다 (여기 값은 placeholder).
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
