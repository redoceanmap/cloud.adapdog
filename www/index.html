<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>발자국 App</title>
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; background: var(--sand-100); display: flex; justify-content: center;
    align-items: flex-start; padding: 0; min-height: 100vh; }
  #root { width: 412px; }

  /* ---- phone ---- */
  .phone { width: 412px; height: 844px; background: var(--surface-card); overflow: hidden; position: relative; }
  .phone__screen { width: 100%; height: 100%; }
  .screen { display: flex; flex-direction: column; height: 100%; position: relative; background: var(--surface-page); }

  /* ---- status bar ---- */
  .statusbar { height: 44px; flex: none; display: flex; align-items: center; justify-content: space-between;
    padding: 0 22px 0 26px; color: var(--text-strong); }
  .statusbar--dark { color: #fff; position: relative; z-index: 2; }
  .statusbar__time { font-weight: 700; font-size: 15px; letter-spacing: .01em; }
  .statusbar__icons { display: flex; gap: 7px; }
  .statusbar__icons i { width: 17px; height: 17px; }

  /* ---- app bar ---- */
  .appbar { flex: none; height: 52px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 8px; gap: 6px; }
  .appbar__title { font: var(--text-title); color: var(--text-strong); letter-spacing: var(--ls-snug); }

  /* ---- generic CTA dock ---- */
  .screen__cta { flex: none; padding: 12px 20px calc(12px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, var(--surface-page) 72%, transparent); }
  .screen__cta--row { display: flex; gap: 10px; align-items: center; }

  .sect-head { display: flex; align-items: center; justify-content: space-between; margin: 4px 0 12px; }
  .sect-head__t { font: var(--text-title-lg); color: var(--text-strong); letter-spacing: var(--ls-snug); }
  .sect-head__more { border: none; background: none; color: var(--text-muted); font: var(--text-label);
    display: flex; align-items: center; gap: 2px; cursor: pointer; }
  .sect-head__more i { width: 15px; height: 15px; }

  /* ---- tab bar ---- */
  .tabbar { flex: none; height: 64px; display: flex; background: var(--surface-card);
    border-top: 1px solid var(--border-subtle); padding-bottom: env(safe-area-inset-bottom); }
  .tabbar__item { flex: 1; border: none; background: none; cursor: pointer; display: flex;
    flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    color: var(--text-subtle); font: var(--text-micro); font-weight: 600; transition: color .15s; }
  .tabbar__item i { width: 22px; height: 22px; }
  .tabbar__item.is-active { color: var(--brand); }

  /* ---- map ---- */
  .map { position: relative; width: 100%; overflow: hidden; background: #e9efe6; }
  .map__bg, .map__route { position: absolute; inset: 0; width: 100%; height: 100%; }
  .map__pin { position: absolute; transform: translate(-50%, -78%); width: 40px; height: 40px;
    filter: drop-shadow(0 3px 4px rgba(42, 36, 29, 0.28)); }
  .map__paw { width: 100%; height: 100%; display: block; }
  .map__pin-n { position: absolute; left: 51.5%; top: 70%; transform: translate(-50%, -50%);
    color: #fff; font-family: var(--font-sans); font-weight: 800; font-size: 13px; line-height: 1; }
  .map__pin--vet { width: 28px; height: 28px; transform: translate(-50%, -50%); filter: none; }
  .map__pin--vet i { width: 26px; height: 26px; color: #fff; background: var(--vet-marker);
    border-radius: 50%; padding: 4px; box-sizing: border-box; border: 2px solid #fff; box-shadow: var(--shadow-sm); }
  .map__controls { position: absolute; right: 12px; bottom: 12px; display: flex; flex-direction: column; gap: 8px; }

  /* ---- auth / 소셜 로그인 ---- */
  .auth { justify-content: space-between; padding: 0 24px calc(28px + env(safe-area-inset-bottom)); }
  .auth__hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; text-align: center; }
  .auth__logo { width: 96px; height: 96px; border-radius: 28px; background: var(--brand-soft); display: grid; place-items: center; box-shadow: var(--shadow-brand-sm); }
  .auth__title { font: var(--text-display-lg); color: var(--text-strong); letter-spacing: var(--ls-tight); }
  .auth__tag { font: var(--text-body); color: var(--text-muted); line-height: var(--lh-relaxed); }
  .auth__actions { flex: none; display: flex; flex-direction: column; gap: 11px; }
  .auth__btn { height: 54px; border-radius: var(--radius-md); border: none; cursor: pointer; width: 100%;
    font: var(--text-title); font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 9px;
    transition: filter .15s, transform .05s; }
  .auth__btn:hover { filter: brightness(0.97); }
  .auth__btn:active { transform: translateY(1px); }
  .auth__ico { display: grid; place-items: center; width: 22px; height: 22px; }
  .auth__btn--kakao { background: #FEE500; color: rgba(0,0,0,0.85); }
  .auth__btn--naver { background: #03C75A; color: #fff; }
  .auth__btn--google { background: #fff; color: #1f1f1f; border: 1px solid var(--border-default); }
  .auth__legal { font: var(--text-caption); color: var(--text-subtle); text-align: center; margin-top: 6px; }

  /* ---- onboarding ---- */
  .ob { flex: 1; overflow-y: auto; padding: 8px 24px 16px; }
  .ob__steps { display: flex; gap: 6px; margin-bottom: 24px; }
  .ob__steps span { height: 5px; flex: 1; border-radius: 99px; background: var(--sand-200); }
  .ob__steps span.is-on { background: var(--brand); }
  .ob__title { font: var(--text-display); color: var(--text-strong); letter-spacing: var(--ls-tight); }
  .ob__sub { font: var(--text-body); color: var(--text-muted); margin-top: 8px; }
  .ob__avatar { display: flex; flex-direction: column; align-items: center; gap: 12px; margin: 26px 0 22px; }
  .ob__upload { border: 1.5px solid var(--border-default); background: var(--surface-card); cursor: pointer;
    border-radius: 99px; padding: 8px 14px; font: var(--text-label); color: var(--text-body);
    display: flex; align-items: center; gap: 6px; }
  .ob__upload i { width: 15px; height: 15px; }
  .ob__form { display: flex; flex-direction: column; gap: 16px; }
  .ob__row { display: grid; grid-template-columns: 1.4fr 1fr; gap: 12px; }
  .ob__row > * { min-width: 0; }
  .ob__ac { position: relative; }
  .ob__ac-list { position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 20; margin: 0;
    list-style: none; padding: 4px; background: var(--surface-card); border: 1px solid var(--border-default);
    border-radius: var(--radius-md); box-shadow: var(--shadow-lg); max-height: 184px; overflow-y: auto; }
  .ob__ac-item { width: 100%; text-align: left; border: none; background: none; cursor: pointer;
    padding: 9px 10px; border-radius: var(--radius-sm); font: var(--text-body); color: var(--text-body);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ob__ac-item:hover { background: var(--surface-sunken); color: var(--text-strong); }
  .ob__guide { display: flex; align-items: center; gap: 6px; margin: -6px 0 0; padding: 9px 12px;
    background: var(--brand-soft); border-radius: var(--radius-sm); font: var(--text-caption); color: var(--text-brand); }
  .ob__guide i { width: 15px; height: 15px; flex: none; }
  .ob__guide strong { font-weight: 700; }
  .ob__label { font: var(--text-label); color: var(--text-strong); margin-bottom: 10px; }
  .ob__chips { display: flex; flex-wrap: wrap; gap: 8px; }

  /* ---- home ---- */
  .home__top { flex: none; padding: 8px 20px 14px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .home__hi { font: var(--text-caption); color: var(--text-muted); }
  .home__q { font: var(--text-display); color: var(--text-strong); letter-spacing: var(--ls-tight); margin-top: 4px; }
  .home__dogs { display: flex; align-items: center; gap: 8px; }
  .home__adddog { width: 40px; height: 40px; border-radius: 50%; border: 1.5px dashed var(--border-strong);
    background: var(--surface-card); color: var(--text-muted); cursor: pointer; display: grid; place-items: center; }
  .home__adddog i { width: 18px; height: 18px; }
  .home__search { margin: 0 20px; flex: none; display: flex; align-items: center; gap: 10px; cursor: pointer;
    text-align: left;
    background: var(--surface-card); border: 1.5px solid var(--border-default); border-radius: var(--radius-pill);
    padding: 14px 14px 14px 18px; box-shadow: var(--shadow-sm); }
  .home__search > i { width: 20px; height: 20px; color: var(--brand); }
  .home__search > span { flex: 1; font: var(--text-body); color: var(--text-subtle); }
  .home__search-go { flex: none; width: 34px; height: 34px; border-radius: 50%; background: var(--brand); color: #fff;
    display: grid; place-items: center; }
  .home__search > .home__search-go { flex: none; }
  .home__search-go i { width: 18px; height: 18px; }
  .home__body { flex: 1; overflow-y: auto; padding: 16px 20px 20px; display: flex; flex-direction: column; gap: 18px; }
  .home__chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; }
  .home__chips::-webkit-scrollbar { display: none; }
  .home__chips > * { flex: none; }

  .course-cards { display: flex; flex-direction: column; gap: 14px; }
  .course-prev { text-align: left; border: 1px solid var(--border-subtle); background: var(--surface-card);
    border-radius: var(--radius-xl); overflow: hidden; cursor: pointer; box-shadow: var(--shadow-sm);
    transition: box-shadow .2s, transform .2s; padding: 0; }
  .course-prev:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .course-prev__img { height: 124px; position: relative; }
  .course-prev__img--a { background: linear-gradient(135deg, #ffd9c7, #ffb38c 55%, #7fc9d6); }
  .course-prev__img--b { background: linear-gradient(135deg, #cfe8d6, #a9d3e8); }
  .course-prev__tag { position: absolute; left: 12px; top: 12px; background: rgba(255,255,255,.92);
    color: var(--text-strong); border-radius: 99px; padding: 6px 11px; font: var(--text-label);
    display: flex; align-items: center; gap: 5px; box-shadow: var(--shadow-sm); }
  .course-prev__tag i { width: 14px; height: 14px; color: var(--brand); }
  .course-prev__body { padding: 14px 16px 16px; }
  .course-prev__t { font: var(--text-title); color: var(--text-strong); letter-spacing: var(--ls-snug); }
  .course-prev__meta { font: var(--text-caption); color: var(--text-muted); margin-top: 6px;
    display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .course-prev__meta i { width: 13px; height: 13px; vertical-align: -2px; }
  .course-prev__badges { display: flex; gap: 5px; margin-top: 11px; flex-wrap: wrap; }

  /* ---- course result ---- */
  .course__sub { flex: none; display: flex; gap: 7px; padding: 4px 20px 12px; overflow-x: auto; }
  .course__sub::-webkit-scrollbar { display: none; }
  .course__pill { flex: none; display: flex; align-items: center; gap: 5px; background: var(--surface-sunken);
    color: var(--text-body); border-radius: 99px; padding: 7px 12px; font: var(--text-label); }
  .course__pill i { width: 14px; height: 14px; }
  .course__pill--vet { background: var(--info-soft); color: var(--info-text); }
  .course__tabs { flex: none; padding: 0 20px 12px; }
  .course__body { flex: 1; overflow-y: auto; }
  .course__list { display: flex; flex-direction: column; gap: 12px; padding: 16px 20px 8px; }

  /* ---- detail ---- */
  .detail__hero { flex: none; height: 220px; position: relative; padding: 0; }
  .detail__hero--allowed { background: linear-gradient(135deg, #bfe9cf, #7fc9d6); }
  .detail__hero--conditional { background: linear-gradient(135deg, #ffe2b0, #ffbf8a); }
  .detail__hero--denied { background: linear-gradient(135deg, #f6c9b8, #e9a99a); }
  .detail__hero-bar { display: flex; align-items: center; justify-content: space-between; padding: 4px 16px; }
  .detail__hero-ico { position: absolute; right: 22px; bottom: 18px; opacity: .55; }
  .detail__hero-ico i { width: 96px; height: 96px; color: #fff; }
  .detail__body { flex: 1; overflow-y: auto; margin-top: -22px; background: var(--surface-page);
    border-radius: var(--radius-2xl) var(--radius-2xl) 0 0; padding: 22px 20px 16px; position: relative; }
  .detail__cat { font: var(--text-label); color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
  .detail__cat i { width: 15px; height: 15px; }
  .detail__name { font: var(--text-display); color: var(--text-strong); letter-spacing: var(--ls-tight); margin: 6px 0 16px; }
  .detail__verdict { display: flex; flex-direction: column; gap: 10px; align-items: flex-start;
    padding: 16px; border-radius: var(--radius-lg); margin-bottom: 20px; }
  .detail__verdict--allowed { background: var(--success-soft); }
  .detail__verdict--conditional { background: var(--warning-soft); }
  .detail__verdict--denied { background: var(--danger-soft); }
  .detail__verdict-txt { font: var(--text-body); color: var(--text-body); display: flex; flex-direction: column; gap: 3px; }
  .detail__verdict-txt strong { font: var(--text-title); color: var(--text-strong); }
  .detail__verdict-txt span { font: var(--text-caption); color: var(--text-muted); }
  .detail__sect { margin-bottom: 20px; }
  .detail__sect-t { font: var(--text-label); color: var(--text-strong); margin-bottom: 10px; }
  .detail__badges { display: flex; flex-wrap: wrap; gap: 8px; }
  .detail__info { display: flex; flex-direction: column; gap: 12px; padding: 16px; background: var(--surface-card);
    border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); margin-bottom: 18px; }
  .detail__info-row { display: flex; align-items: flex-start; gap: 10px; font: var(--text-body); color: var(--text-body); }
  .detail__info-row i { width: 18px; height: 18px; color: var(--text-subtle); flex: none; margin-top: 1px; }
  .detail__info-row strong { color: var(--text-strong); font-weight: 700; }
  .detail__body .map { border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="api.js"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
</body>
</html>
